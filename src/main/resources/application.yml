spring:
  application:
    name: inventory

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true  # 기존 테이블이 있어도 에러 안 남
      oracle:
        sqlplus: true   # PL/SQL 블록 실행 허용

mybatis:
  mapper-locations: classpath:mapper/**/*.xml   # XML 매퍼 경로
  type-aliases-package: com.example.inventory.domain  # DTO 패키지
  configuration:
    map-underscore-to-camel-case: true          # ex) item_name → itemName 자동 변환
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 쿼리 로그 출력

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.example.inventory: DEBUG