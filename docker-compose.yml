# docker-compose.yml
version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    env_file:
      - .env          # .env 파일을 읽어서 환경변수로 주입
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata # 데이터 영속성
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s               # 첫 기동은 2분 정도 걸림

volumes:
  oracle-data: